<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taş Kağıt Makas - Arcade</title>
    <!-- Modern olmayan, retro görünüm için piksel font ekliyoruz -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1 class="glitch" data-text="TAŞ KAĞIT MAKAS">TAŞ KAĞIT MAKAS</h1>
            <p class="subtitle">INSERT COIN TO PLAY</p>
        </header>

        <main>
            <div class="scoreboard">
                <div class="score-card player-score-card">
                    <h2>SEN</h2>
                    <span id="player-score" class="score-number">0</span>
                </div>
                <!-- Ortadaki VS sadece dekoratif kalacak, sonuç buraya yansımayacak üstte duracak -->
                <div class="score-card computer-score-card">
                    <h2>BILGISAYAR</h2>
                    <span id="computer-score" class="score-number">0</span>
                </div>
            </div>
            
            <div class="battlefield">
                <div class="fighter player-fighter" id="player-fighter">?</div>
                <div class="vs">VS</div>
                <div class="fighter computer-fighter" id="computer-fighter">?</div>
            </div>
            
            <div class="result-board">
                <p id="result-message">HADI BASLA!</p>
            </div>

            <div class="controls">
                <button class="choice-btn" id="tas">
                    <span class="icon">🪨</span>
                    <span class="text">TAŞ</span>
                </button>
                <button class="choice-btn" id="kagit">
                    <span class="icon">📄</span>
                    <span class="text">KAĞIT</span>
                </button>
                <button class="choice-btn" id="makas">
                    <span class="icon">✂️</span>
                    <span class="text">MAKAS</span>
                </button>
            </div>
        </main>
        
        <footer>
            <p>© RETRO STUDIOS</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
